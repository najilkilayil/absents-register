<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absent Register</title>
    <link rel="icon"
        href="https://th.bing.com/th/id/OIP.eJ1UZood3yoH5ijrFPlMpAHaHa?w=181&h=197&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"
        type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="input_area">
        <input type="date" id="date-el">
        <input type="text" id="name-el" placeholder="John Lokan">
    </div>

    <div class="btn_area">
        <button id="save-btn">SAVE</button>
    </div>
    
    <div class="table_area">
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>No.</th>
                </tr>
            </thead>
            <tbody id="table-el">
                <tr>
                    <td>12-13-2025</td>
                    <td>John Loken</td>
                    <td>2</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>

</html>
